rule: lateral_movement_via_psexec
emits: [lateral_movement, payload_executed]
signals:
  - artifact: evtx.query
    supports: lateral_movement
    weight: 0.85
    independent_of: evtx.query

  - artifact: registry.run_keys
    supports: lateral_movement
    weight: 0.60
    independent_of: evtx.query

  - artifact: prefetch.run_record
    supports: payload_executed
    weight: 0.90
    independent_of: prefetch.run_record

  - artifact: fs.stat_hash
    supports: payload_present
    weight: 0.70
    independent_of: fs.stat_hash

  - artifact: net.flows
    supports: lateral_movement
    weight: 0.75
    independent_of: evtx.query

contradictions:
  - artifact: evtx.query
    weight: 0.70

provenance: "SANS FOR508; Microsoft Windows Security Auditing; MITRE ATT&CK T1021; Mandiant APT lateral movement TTPs"

