rule: credential_dumping_detected
emits: [credential_access]
signals:
  - artifact: evtx.query
    supports: credential_access
    weight: 0.85
    independent_of: evtx.query
    requires: "lsass_or_hive_access == true"

  - artifact: mem.malfind
    supports: credential_access
    weight: 0.80
    independent_of: evtx.query
    requires: "lsass_injection == true"

  - artifact: prefetch.run_record
    supports: credential_access
    weight: 0.88
    independent_of: prefetch.run_record
    requires: "cred_dump_tool == true"

  - artifact: mem.pslist
    supports: credential_access
    weight: 0.70
    independent_of: mem.pslist
    requires: "cred_dump_tool == true"

  - artifact: fs.stat_hash
    supports: credential_access
    weight: 0.65
    independent_of: fs.stat_hash
    requires: "cred_dump_artifact == true"

provenance: "SANS FOR508 Module 6; Mimikatz detection - Benjamin Delpy; MITRE ATT&CK T1003; Windows LSASS forensics"

---

rule: sam_hive_accessed
emits: [credential_access]
signals:
  - artifact: registry.run_keys
    supports: credential_access
    weight: 0.60
    independent_of: registry.run_keys
    requires: "sam_related_key == true"

  - artifact: evtx.query
    supports: credential_access
    weight: 0.80
    independent_of: evtx.query
    requires: "lsass_or_hive_access == true"

  - artifact: mft.timeline
    supports: credential_access
    weight: 0.65
    independent_of: mft.timeline
    requires: "hive_file_referenced == true"

provenance: "SANS FOR508; SAM hive access forensics; MITRE ATT&CK T1003.002"
